{% extends 'tasks/base.html' %}
{% block content %}
<section class="panel">
    <h1>Log In</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button">Continue</button>
    </form>
    <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
</section>
{% endblock %}
