{% extends 'tasks/base.html' %}
{% block content %}
<section class="panel">
    <h1>Sign Up</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button">Create Account</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Log in</a></p>
</section>
{% endblock %}
